<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluesky Statistics — User Growth Dashboard</title>
    <meta
      name="description"
      content="Daily Bluesky user growth statistics. Track total users, daily growth, monthly trends, and key milestones."
    />
    <meta
      name="google-site-verification"
      content="lwtgwu66MpwUzZLBHxWCleseqlux7yY0H2-LTCA8wsc"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-wrap">
      <!-- ── Header ── -->
      <header class="site-header fi fi1">
        <h1 class="site-title">Bluesky Statistics</h1>
        <span class="site-updated mono muted" id="headerDate">Updated —</span>
      </header>

      <!-- ── KPI Cards ── -->
      <section class="kpi-grid fi fi2" aria-label="Key metrics">
        <!-- Card 1: Total Users -->
        <div class="card kpi-card" id="kpi-total">
          <div class="kpi-label">Total users</div>
          <div class="kpi-number mono" id="kpiTotalUsers">—</div>
          <div class="sparkline" id="sparkline" aria-hidden="true"></div>
        </div>

        <!-- Card 2: 30d growth -->
        <div class="card kpi-card" id="kpi-30d">
          <div class="kpi-label">30d growth</div>
          <div class="kpi-number mono" id="kpi30dPct">—</div>
          <div class="kpi-sub green mono" id="kpi30dAbs"></div>
        </div>

        <!-- Card 3: Avg daily 7d -->
        <div class="card kpi-card" id="kpi-7d">
          <div class="kpi-label">Avg daily (7d)</div>
          <div class="kpi-number mono" id="kpiAvg7d">—</div>
          <div class="kpi-sub green mono" id="kpiAvg7dSub"></div>
        </div>

        <!-- Card 4: New today -->
        <div class="card kpi-card" id="kpi-today">
          <div class="kpi-label">New today</div>
          <div class="kpi-number mono" id="kpiNewToday">—</div>
          <div class="kpi-sub green mono" id="kpiNewTodaySub"></div>
        </div>
      </section>

      <!-- ── Daily New Users ── -->
      <section class="card chart-card fi fi3" id="dailySection">
        <div class="chart-header">
          <div class="section-title">Daily new users</div>
          <div
            class="range-selector"
            id="rangeSelector"
            role="group"
            aria-label="Time range"
          >
            <button class="range-btn mono" data-days="7">7d</button>
            <button class="range-btn mono" data-days="30">30d</button>
            <button class="range-btn mono active" data-days="90">90d</button>
            <button class="range-btn mono" data-days="365">1y</button>
            <button class="range-btn mono" data-days="0">All</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas
            id="dailyChart"
            aria-label="Daily new users bar chart"
          ></canvas>
        </div>
      </section>

      <!-- ── Monthly Overview ── -->
      <div class="two-col fi fi4">
        <!-- Monthly Growth -->
        <div class="card chart-card">
          <div class="chart-header">
            <div class="section-title">Monthly growth</div>
            <div class="chart-sub mono muted">Last 18 mo</div>
          </div>
          <div class="chart-wrap chart-wrap--sm">
            <canvas
              id="monthlyGrowthChart"
              aria-label="Monthly growth bar chart"
            ></canvas>
          </div>
        </div>

        <!-- Growth Rate -->
        <div class="card chart-card">
          <div class="chart-header">
            <div class="section-title">Growth rate</div>
            <div class="chart-sub mono muted">% / month</div>
          </div>
          <div class="chart-wrap chart-wrap--sm">
            <canvas
              id="growthRateChart"
              aria-label="Monthly growth rate line chart"
            ></canvas>
          </div>
        </div>
      </div>

      <!-- ── Key Milestones ── -->
      <section
        class="card milestones-card fi fi5"
        id="milestonesSection"
        aria-label="Key milestones"
      >
        <div class="milestones-header">
          <div class="section-title">Ecosystem Milestones</div>
          <div class="milestones-nav">
            <button class="nav-btn" id="msPrev" aria-label="Previous">←</button>
            <button class="nav-btn" id="msNext" aria-label="Next">→</button>
          </div>
        </div>
        <div class="milestones-grid" id="milestonesGrid"></div>
      </section>

      <!-- ── Monthly Breakdown Table ── -->
      <section
        class="card table-card fi fi6"
        id="tableSection"
        aria-label="Monthly breakdown"
      >
        <div class="table-header">
          <div class="section-title">Monthly breakdown</div>
        </div>
        <div class="table-scroll">
          <table id="monthlyTable" class="data-table">
            <thead>
              <tr>
                <th>Month</th>
                <th>End Total</th>
                <th>New Users</th>
                <th>Avg / Day</th>
                <th>Growth</th>
              </tr>
            </thead>
            <tbody id="monthlyTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </section>
    </div>
    <!-- /.page-wrap -->

    <!-- ── Footer ── -->
    <footer class="site-footer fi fi7">
      <div class="page-wrap footer-inner">
        <span class="mono muted"
          >Source:
          <a
            href="https://bsky.jazco.dev/stats"
            target="_blank"
            rel="noopener"
            class="footer-link"
            >Jaz's bsky stats</a
          ></span
        >
        <span class="mono muted"
          ><a
            href="https://github.com/Krekeny/bluesky-stats"
            target="_blank"
            rel="noopener"
            class="footer-link"
            >GitHub Repository</a
          ></span
        >
        <span class="mono muted" id="footerYear"></span>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
